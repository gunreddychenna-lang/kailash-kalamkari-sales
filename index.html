<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KK Sales Portal</title>
  <!-- Tailwind CSS for clean, mobile-first styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome for clean traditional icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* Traditional custom colors for a peaceful textile look */
    body {
      background-color: #FAF7F2; /* Warm organic linen/cream */
    }
  </style>
</head>
<body class="text-stone-800 font-sans pb-16 min-h-screen">

  <!-- Elegant Traditional Header -->
  <header class="bg-[#4A121A] text-white shadow-md sticky top-0 z-50 border-b-2 border-[#B38F4D]">
    <div class="max-w-md mx-auto px-5 py-4 flex justify-between items-center">
      <div>
        <h1 class="text-lg font-bold tracking-wide text-[#EFE5C9]">KK Kalamkari</h1>
        <p class="text-[10px] text-stone-300 font-medium tracking-wider">Live Sales & Analytics</p>
      </div>
      <button id="refresh-btn" class="bg-[#B38F4D] hover:bg-[#9B773C] text-[#FAF7F2] font-bold text-xs px-3 py-2 rounded-lg transition-all flex items-center gap-1.5 shadow-sm">
        <i class="fa-solid fa-arrows-rotate"></i> Refresh
      </button>
    </div>
  </header>

  <!-- Mobile-First Container -->
  <main class="max-w-md mx-auto px-4 mt-5 space-y-4">

    <!-- Loading Spinner -->
    <div id="loader" class="text-center py-24">
      <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#8C2D19] mx-auto"></div>
      <p class="mt-4 text-xs text-stone-500 font-semibold tracking-wide">Syncing traditional ledger data...</p>
    </div>

    <!-- Main Web Dashboard Content -->
    <div id="app-container" class="hidden space-y-4">

      <!-- Calendar Range Selectors (Beside Date Inputs) -->
      <div class="bg-white p-5 rounded-2xl border border-stone-200/80 shadow-sm space-y-3">
        <div class="flex justify-between items-center border-b border-stone-100 pb-1.5">
          <h2 class="text-xs font-bold uppercase tracking-wider text-stone-500">
            <i class="fa-solid fa-filter text-[#8C2D19] mr-1"></i> Date Filter
          </h2>
          <button id="clear-dates-btn" class="text-[10px] font-bold text-[#8C2D19] hover:underline uppercase tracking-wider">Reset</button>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <!-- From Date -->
          <div>
            <label class="block text-[10px] font-bold text-stone-500 uppercase tracking-wider mb-1">From Date</label>
            <div class="flex gap-1.5">
              <input type="date" id="from-date" class="flex-1 text-xs bg-stone-50 border border-stone-200 rounded-xl p-2.5 text-stone-800 focus:outline-none focus:ring-1 focus:ring-[#8C2D19] focus:border-[#8C2D19] transition-all">
              <button onclick="document.getElementById('from-date').showPicker()" class="bg-[#8C2D19] text-white px-3.5 rounded-xl hover:bg-[#732111] transition-colors shadow-sm flex items-center justify-center">
                <i class="fa-regular fa-calendar-days text-sm"></i>
              </button>
            </div>
          </div>
          <!-- To Date -->
          <div>
            <label class="block text-[10px] font-bold text-stone-500 uppercase tracking-wider mb-1">To Date</label>
            <div class="flex gap-1.5">
              <input type="date" id="to-date" class="flex-1 text-xs bg-stone-50 border border-stone-200 rounded-xl p-2.5 text-stone-800 focus:outline-none focus:ring-1 focus:ring-[#8C2D19] focus:border-[#8C2D19] transition-all">
              <button onclick="document.getElementById('to-date').showPicker()" class="bg-[#8C2D19] text-white px-3.5 rounded-xl hover:bg-[#732111] transition-colors shadow-sm flex items-center justify-center">
                <i class="fa-regular fa-calendar-days text-sm"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Clean Visual Scorecards -->
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-white p-5 rounded-2xl border border-stone-200/80 shadow-sm col-span-2">
          <p class="text-[10px] font-bold text-stone-400 uppercase tracking-wider">Total Sales Revenue</p>
          <p id="metric-total" class="text-3xl font-black text-[#8C2D19] mt-1">₹0</p>
        </div>
        <div class="bg-white p-4 rounded-2xl border border-stone-200/80 shadow-sm">
          <p class="text-[9px] font-bold text-stone-400 uppercase tracking-wider flex items-center gap-1">
            <span class="w-1.5 h-1.5 rounded-full bg-blue-500 inline-block"></span> Online Sale
          </p>
          <p id="metric-online" class="text-base font-extrabold text-stone-800 mt-1">₹0</p>
        </div>
        <div class="bg-white p-4 rounded-2xl border border-stone-200/80 shadow-sm">
          <p class="text-[9px] font-bold text-stone-400 uppercase tracking-wider flex items-center gap-1">
            <span class="w-1.5 h-1.5 rounded-full bg-orange-400 inline-block"></span> Offline Sale
          </p>
          <p id="metric-offline" class="text-base font-extrabold text-stone-800 mt-1">₹0</p>
        </div>
        <div class="bg-white p-4 rounded-2xl border border-stone-200/80 shadow-sm col-span-2">
          <p class="text-[9px] font-bold text-stone-400 uppercase tracking-wider flex items-center gap-1">
            <span class="w-1.5 h-1.5 rounded-full bg-purple-500 inline-block"></span> Wholesale (By Hand)
          </p>
          <p id="metric-wholesale" class="text-base font-extrabold text-[#8C2D19] mt-1">₹0</p>
        </div>
      </div>

      <!-- Traditional Styling Tabs (Warm colors) -->
      <div class="flex bg-stone-200/60 rounded-xl p-1 shadow-inner border border-stone-200/30">
        <button onclick="switchTab('products-tab')" id="btn-products-tab" class="flex-1 text-center py-2 text-xs font-bold rounded-lg transition-all bg-white text-[#8C2D19] shadow-sm">Products</button>
        <button onclick="switchTab('agents-tab')" id="btn-agents-tab" class="flex-1 text-center py-2 text-xs font-bold rounded-lg transition-all text-stone-500 hover:text-stone-700">Staff & Agents</button>
      </div>

      <!-- Tab 1: Product-Wise Sales View -->
      <div id="products-tab" class="tab-content space-y-4">
        
        <!-- Beautiful product search input -->
        <div class="relative">
          <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3.5 text-stone-400 text-xs"></i>
          <input type="text" id="product-search" placeholder="Search product line..." class="w-full text-xs bg-white border border-stone-200 rounded-2xl py-3 pl-10 pr-4 text-stone-800 focus:outline-none focus:ring-1 focus:ring-[#8C2D19] focus:border-[#8C2D19] transition-all shadow-sm">
        </div>

        <div class="bg-white rounded-2xl border border-stone-200/80 overflow-hidden shadow-sm">
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse text-xs">
              <thead>
                <tr class="bg-[#F3EFE9] text-stone-600 uppercase text-[9px] font-extrabold tracking-wider border-b border-stone-200/80">
                  <th class="p-3.5 cursor-pointer select-none" onclick="sortProducts('item')">Item Name <i class="fa-solid fa-sort ml-1 opacity-70"></i></th>
                  <th class="p-3.5 text-center cursor-pointer select-none w-16" onclick="sortProducts('qty')">Qty <i class="fa-solid fa-sort ml-1 opacity-70"></i></th>
                  <th class="p-3.5 text-right cursor-pointer select-none" onclick="sortProducts('revenue')">Revenue <i class="fa-solid fa-sort ml-1 opacity-70"></i></th>
                </tr>
              </thead>
              <tbody id="products-table-body" class="divide-y divide-stone-100">
                <!-- Dynamically populated rows -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Tab 2: Agents / Staff Sales View -->
      <div id="agents-tab" class="tab-content hidden space-y-4">
        <div class="bg-white rounded-2xl border border-stone-200/80 overflow-hidden shadow-sm">
          <div class="p-4 bg-[#F3EFE9] border-b border-stone-200/80 flex justify-between items-center">
            <h3 class="text-xs font-bold uppercase tracking-wider text-stone-600">Staff Sales Leaderboard</h3>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse text-xs">
              <thead>
                <tr class="bg-[#F3EFE9] text-stone-600 uppercase text-[9px] font-extrabold tracking-wider border-b border-stone-200/80">
                  <th class="p-3.5 cursor-pointer select-none" onclick="sortAgents('name')">Staff Name <i class="fa-solid fa-sort ml-1 opacity-70"></i></th>
                  <th class="p-3.5 text-right cursor-pointer select-none" onclick="sortAgents('revenue')">Total Sold <i class="fa-solid fa-sort ml-1 opacity-70"></i></th>
                </tr>
              </thead>
              <tbody id="agents-table-body" class="divide-y divide-stone-100">
                <!-- Dynamically populated rows -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Agent Detail Card (Shows up-to-date detailed sales for clicked staff member) -->
        <div id="agent-detail-card" class="hidden bg-white rounded-2xl border border-stone-200/80 overflow-hidden shadow-sm space-y-3 transition-all duration-300">
          <div class="p-4 bg-[#8C2D19] text-white flex justify-between items-center">
            <div>
              <h3 id="detail-agent-name" class="font-bold text-sm tracking-wide">Staff Detail</h3>
              <p class="text-[10px] text-stone-200 font-medium tracking-wide">Sales Breakdown</p>
            </div>
            <button onclick="closeAgentDetail()" class="text-white font-bold hover:opacity-80"><i class="fa-solid fa-circle-xmark text-lg"></i></button>
          </div>
          <div class="p-2 overflow-x-auto">
            <table class="w-full text-left border-collapse text-xs">
              <thead>
                <tr class="text-stone-400 text-[9px] uppercase font-bold border-b border-stone-200/50">
                  <th class="p-2">Item Name</th>
                  <th class="p-2 text-center">Qty</th>
                  <th class="p-2 text-right">Revenue</th>
                </tr>
              </thead>
              <tbody id="agent-detail-table-body" class="divide-y divide-stone-100">
                <!-- Dynamically populated rows on user selection -->
              </tbody>
            </table>
          </div>
        </div>

      </div>

    </div>
  </main>

  <script>
    // 1. PLACE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE:
    const API_URL = "https://script.google.com/macros/s/AKfycbznDglARBPtYlZ5vDx-CfFHVQ4mEfBCvqyMcqGZJvDhgkNb1vcv4BcWLfWfsISsbCUa/exec"; 

    let rawData = [];
    let productsList = [];
    let agentsList = [];
    let selectedAgentDetail = null;

    // Sorting state variables
    let prodSortCol = 'qty';
    let prodSortAsc = false;
    let agentSortCol = 'revenue';
    let agentSortAsc = false;

    // Classification mapping based on your custom sheets setup
    function getSalesType(payMode) {
      if (!payMode) return 'Offline';
      const pm = payMode.toString().toLowerCase().trim();
      if (pm.includes('onl') || pm.includes('online')) {
        return 'Online';
      } else if (pm.includes('by hand') || pm.includes('hand') || pm.includes('wholesale') || pm.includes('take by hand')) {
        return 'Wholesale';
      } else {
        // Includes UPI (store), cash, card
        return 'Offline';
      }
    }

    async function fetchData() {
      document.getElementById('loader').classList.remove('hidden');
      document.getElementById('app-container').classList.add('hidden');
      try {
        const response = await fetch(API_URL);
        rawData = await response.json();
        
        detectDateRanges();
        processData();

        document.getElementById('loader').classList.add('hidden');
        document.getElementById('app-container').classList.remove('hidden');
      } catch (error) {
        alert("Failed to load ledgers from Google Sheets. Ensure the deployment URL is active.");
        console.error(error);
      }
    }

    function detectDateRanges() {
      if (rawData.length === 0) return;
      const dates = rawData.map(row => row['Bill Date']).filter(Boolean).sort();
      if (dates.length > 0) {
        document.getElementById('from-date').value = dates[0];
        document.getElementById('to-date').value = dates[dates.length - 1];
      }
    }

    function processData() {
      const fromDate = document.getElementById('from-date').value;
      const toDate = document.getElementById('to-date').value;
      const searchVal = document.getElementById('product-search').value.toLowerCase();

      // Filter rows based on date limits selected by MD
      const filtered = rawData.filter(row => {
        if (!row['Bill Date']) return false;
        const rDate = row['Bill Date'];
        let match = true;
        if (fromDate) match = match && (rDate >= fromDate);
        if (toDate) match = match && (rDate <= toDate);
        return match;
      });

      // Clear financial calculations metrics
      let totalSales = 0;
      let totalOnline = 0;
      let totalOffline = 0;
      let totalWholesale = 0;

      const productsObj = {};
      const agentsObj = {};

      filtered.forEach(row => {
        const amount = parseFloat(row['BillAmount']) || 0;
        const qty = parseInt(row['Qty']) || 0;
        const item = row['Item Name'] || 'Unknown Item';
        const agent = row['SM Name'] || 'No Agent';
        const type = getSalesType(row['PayMode']);

        // Sum overall dashboard scores
        totalSales += amount;
        if (type === 'Online') totalOnline += amount;
        else if (type === 'Wholesale') totalWholesale += amount;
        else totalOffline += amount;

        // Populate and calculate product specifications
        if (!productsObj[item]) {
          productsObj[item] = { name: item, qty: 0, revenue: 0, onlineQty: 0, offlineQty: 0, wholesaleQty: 0 };
        }
        productsObj[item].qty += qty;
        productsObj[item].revenue += amount;
        if (type === 'Online') productsObj[item].onlineQty += qty;
        else if (type === 'Wholesale') productsObj[item].wholesaleQty += qty;
        else productsObj[item].offlineQty += qty;

        // Populate and calculate staff statistics
        if (!agentsObj[agent]) {
          agentsObj[agent] = { name: agent, revenue: 0, items: {} };
        }
        agentsObj[agent].revenue += amount;
        if (!agentsObj[agent].items[item]) {
          agentsObj[agent].items[item] = { qty: 0, revenue: 0 };
        }
        agentsObj[agent].items[item].qty += qty;
        agentsObj[agent].items[item].revenue += amount;
      });

      // Update Financial Metrics on screens
      document.getElementById('metric-total').textContent = `₹${totalSales.toLocaleString('en-IN')}`;
      document.getElementById('metric-online').textContent = `₹${totalOnline.toLocaleString('en-IN')}`;
      document.getElementById('metric-offline').textContent = `₹${totalOffline.toLocaleString('en-IN')}`;
      document.getElementById('metric-wholesale').textContent = `₹${totalWholesale.toLocaleString('en-IN')}`;

      // Convert Maps to arrays for searching
      productsList = Object.values(productsObj).filter(p => p.name.toLowerCase().includes(searchVal));
      agentsList = Object.values(agentsObj);

      renderProductsTable();
      renderAgentsTable();

      // Auto refresh detail views if open
      if (selectedAgentDetail) {
        showAgentDetails(selectedAgentDetail);
      }
    }

    // Dynamic sorting algorithms
    function sortProducts(column) {
      if (prodSortCol === column) {
        prodSortAsc = !prodSortAsc;
      } else {
        prodSortCol = column;
        prodSortAsc = false;
      }
      renderProductsTable();
    }

    function renderProductsTable() {
      productsList.sort((a, b) => {
        let valA = a.revenue, valB = b.revenue;
        if (prodSortCol === 'item') {
          valA = a.name.toLowerCase();
          valB = b.name.toLowerCase();
          return prodSortAsc ? (valA < valB ? -1 : 1) : (valA > valB ? -1 : 1);
        } else if (prodSortCol === 'qty') {
          valA = a.qty;
          valB = b.qty;
        }
        return prodSortAsc ? valA - valB : valB - valA;
      });

      const tbody = document.getElementById('products-table-body');
      tbody.innerHTML = productsList.map(p => `
        <tr class="hover:bg-stone-50 transition-colors">
          <td class="p-3.5">
            <div class="font-bold text-stone-800">${p.name}</div>
            <div class="text-[9px] text-stone-500 font-medium mt-1">
              <span class="text-blue-500">Online: ${p.onlineQty}</span> • 
              <span class="text-orange-500">Offline: ${p.offlineQty}</span> • 
              <span class="text-purple-600">Wholesale: ${p.wholesaleQty}</span>
            </div>
          </td>
          <td class="p-3.5 text-center font-bold text-stone-700">${p.qty}</td>
          <td class="p-3.5 text-right font-bold text-[#8C2D19]">₹${p.revenue.toLocaleString('en-IN')}</td>
        </tr>
      `).join('');
    }

    function sortAgents(column) {
      if (agentSortCol === column) {
        agentSortAsc = !agentSortAsc;
      } else {
        agentSortCol = column;
        agentSortAsc = false;
      }
      renderAgentsTable();
    }

    function renderAgentsTable() {
      agentsList.sort((a, b) => {
        let valA = a.revenue, valB = b.revenue;
        if (agentSortCol === 'name') {
          valA = a.name.toLowerCase();
          valB = b.name.toLowerCase();
          return agentSortAsc ? (valA < valB ? -1 : 1) : (valA > valB ? -1 : 1);
        }
        return agentSortAsc ? valA - valB : valB - valA;
      });

      const tbody = document.getElementById('agents-table-body');
      tbody.innerHTML = agentsList.map(a => `
        <tr class="hover:bg-stone-50 transition-colors cursor-pointer" onclick="showAgentDetails('${a.name}')">
          <td class="p-3.5 font-bold text-stone-700 flex justify-between items-center">
            <span>${a.name}</span>
            <i class="fa-solid fa-angle-right text-[10px] text-stone-400 mr-2"></i>
          </td>
          <td class="p-3.5 text-right font-extrabold text-[#8C2D19]">₹${a.revenue.toLocaleString('en-IN')}</td>
        </tr>
      `).join('');
    }

    // Detailed Modal style layout: Shows specific products sold by clicked agent
    function showAgentDetails(agentName) {
      selectedAgentDetail = agentName;
      const agentObj = agentsList.find(a => a.name === agentName);
      if (!agentObj) return;

      document.getElementById('detail-agent-name').textContent = `${agentObj.name} Ledger`;
      
      const sortedItems = Object.entries(agentObj.items).sort((a, b) => b[1].qty - a[1].qty);
      const detailTbody = document.getElementById('agent-detail-table-body');

      detailTbody.innerHTML = sortedItems.map(([itemName, values]) => `
        <tr class="hover:bg-stone-50 transition-colors">
          <td class="p-2.5 font-semibold text-stone-700">${itemName}</td>
          <td class="p-2.5 text-center font-bold text-stone-500">${values.qty}</td>
          <td class="p-2.5 text-right font-extrabold text-[#8C2D19]">₹${values.revenue.toLocaleString('en-IN')}</td>
        </tr>
      `).join('');

      document.getElementById('agent-detail-card').classList.remove('hidden');
      document.getElementById('agent-detail-card').scrollIntoView({ behavior: 'smooth' });
    }

    function closeAgentDetail() {
      selectedAgentDetail = null;
      document.getElementById('agent-detail-card').classList.add('hidden');
    }

    // Tab Switcher Controller
    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(tabId).classList.remove('hidden');

      document.getElementById('btn-products-tab').className = tabId === 'products-tab' 
        ? "flex-1 text-center py-2 text-xs font-bold rounded-lg transition-all bg-white text-[#8C2D19] shadow-sm"
        : "flex-1 text-center py-2 text-xs font-bold rounded-lg transition-all text-stone-500 hover:text-stone-700";
        
      document.getElementById('btn-agents-tab').className = tabId === 'agents-tab' 
        ? "flex-1 text-center py-2 text-xs font-bold rounded-lg transition-all bg-white text-[#8C2D19] shadow-sm"
        : "flex-1 text-center py-2 text-xs font-bold rounded-lg transition-all text-stone-500 hover:text-stone-700";
    }

    // Attach Event Listeners
    document.getElementById('from-date').addEventListener('change', processData);
    document.getElementById('to-date').addEventListener('change', processData);
    document.getElementById('product-search').addEventListener('input', processData);
    document.getElementById('refresh-btn').addEventListener('click', fetchData);
    document.getElementById('clear-dates-btn').addEventListener('click', () => {
      detectDateRanges();
      processData();
    });

    // Run app initially
    fetchData();
  </script>
</body>
</html>
